        html += _locationFieldHtml('maint-loc-select', 'maint-location', '', loc, '') + '</div>';
        html += '<div class="form-group"><label class="label">次回整備予定日</label><input type="date" id="maint-next" class="input" /></div>';
        html += '</div>';
        html += '<div class="form-group"><label class="label">整備内容</label>';
        html += '<select id="maint-desc-select" class="select" style="margin-bottom:0.5rem;" onchange="selectMaintenanceContent(\'maint-desc-select\',\'maint-desc\')">';
        html += '<option value="">選択して追記...</option>';
        state.maintenanceContents.forEach(c => { html += '<option value="' + c + '">' + c + '</option>'; });
        html += '</select>';
        html += '<textarea id="maint-desc" class="textarea" rows="3">' + (TEST_MODE?'定期点検実施（異常なし）':'') + '</textarea>';
        html += '<div style="display:flex;gap:0.5rem;margin-top:0.5rem;">';
        html += '<input type="text" id="new-maint-content" class="input" placeholder="新しい整備内容を追加..." style="flex:1;" />';
        html += '<button type="button" onclick="addMaintenanceContent(\'new-maint-content\')" class="btn btn-secondary" style="white-space:nowrap;">＋ 追加</button>';
        html += '</div></div>';
        html += '<div class="form-group"><label class="label">備考</label><textarea id="maint-notes" class="textarea" rows="2"></textarea></div>';
        html += '<div class="flex gap-2"><button onclick="submitMaintenanceLog()" class="btn btn-primary">保存</button>';
        html += '<button onclick="state.showMaintenanceForm=false;render();" class="btn btn-secondary">キャンセル</button></div></div>';
    }
    logs.forEach(log => {
        html += '<div class="card"><div class="flex-between mb-2"><div>';
        html += '<h3 class="font-bold" style="font-size:1.1rem;">' + getDroneName(log.droneId) + '</h3>';
        html += '<p class="text-gray text-sm">' + log.date + '</p></div>';
        html += '<div class="flex gap-2" style="align-items:center;">';
        html += '<span class="badge badge-green">' + log.type + '</span>';
        html += '<button onclick="openMaintenanceEditModal(\'' + log.id + '\')" class="btn btn-secondary btn-small">✏ 編集</button>';
        html += '<button onclick="deleteMaintenanceLog(\'' + log.id + '\')" class="btn btn-danger btn-small">🗑</button>';
        html += '</div></div>';
        html += '<div class="text-sm"><p><span class="font-medium">作業者:</span> ' + log.technician + '</p>';
        if (log.maintenanceLocation) html += '<p><span class="font-medium">場所:</span> ' + log.maintenanceLocation + '</p>';
        html += '<p class="mt-2"><span class="font-medium">内容:</span> ' + log.description + '</p></div>';
        if (log.nextDate) html += '<p class="text-sm mt-2" style="color:#2563eb;">次回整備予定: ' + log.nextDate + '</p>';
        if (log.notes) html += '<p class="text-sm text-gray mt-2 pt-2 border-t"><span class="font-medium">備考:</span> ' + log.notes + '</p>';
        html += '</div>';
    });
    if (!logs.length) html += '<div class="empty-state">整備記録がありません</div>';
    return html;
}

// ─── 管理タブ（機体＋操縦者） ────────────────────────────────────────────────
function renderManageTab() {
    return renderDronesTab() + '<hr style="margin:1.5rem 0;border:none;border-top:2px solid #e5e7eb;">' + renderPilotsTab();
}

// ─── 機体管理タブ ─────────────────────────────────────────────────────────────
function renderDronesTab() {
    let html = '<div class="flex-between mb-2"><h2 class="font-bold" style="font-size:1.25rem;">登録機体（' + state.drones.length + '機）</h2>';
    html += '<button onclick="state.showDroneForm=!state.showDroneForm;render();" class="btn btn-primary">+ 機体追加</button></div>';
    if (state.showDroneForm) {
        html += '<div class="form-card"><div class="grid grid-2">';
        [['drone-mfg','メーカー *','text'],['drone-model','機種 *','text'],['drone-serial','製造番号 *','text'],
         ['drone-reg','登録記号','text'],['drone-weight','重量（g）*','number']].forEach(([id,label,type]) => {
            html += '<div class="form-group"><label class="label">' + label + '</label><input type="' + type + '" id="' + id + '" class="input"' + (id==='drone-reg'?' placeholder="JU-XXXXX"':'') + ' /></div>';
        });
        html += '<div class="form-group"><label class="label">購入日 *</label><input type="date" id="drone-purchase" class="input" value="' + TODAY + '" /></div>';
        html += '<div class="form-group"><label class="label">アプリ登録年月日</label>'
              + '<input type="date" id="drone-app-reg-date" class="input" value="' + TODAY + '" /></div>';
        html += '<div class="form-group"><label class="label">登録前の総飛行時間（分）</label>'
              + '<input type="number" id="drone-pre-mins" class="input" min="0" placeholder="0" /></div>';
        html += '</div><div class="flex gap-2"><button onclick="submitDrone()" class="btn btn-primary">保存</button>';
        html += '<button onclick="state.showDroneForm=false;render();" class="btn btn-secondary">キャンセル</button></div></div>';
    }
    html += '<div class="grid grid-2">';
    state.drones.forEach(d => {
        // この機体の総飛行時間・飛行回数を集計
        const droneLogs = state.flightLogs.filter(l => l.droneId === d.id);
        const appSecs   = droneLogs.reduce((sum, l) => sum + (l.totalFlightSecs || 0), 0);
        const preRegSecs = (d.preRegistrationMins || 0) * 60;
        const totalSecs  = appSecs + preRegSecs;
        const flightCount = droneLogs.length;
        const lastFlight = droneLogs[0];

        html += '<div class="card"><div class="flex-between" style="margin-bottom:0.5rem;">';
        html += '<h3 class="font-bold" style="font-size:1.1rem;">' + d.manufacturer + ' ' + d.model + '</h3>';
        html += '<div class="flex gap-2">';
        html += '<button onclick="openDroneEditModal(\'' + d.id + '\')" class="btn btn-secondary btn-small">✏ 編集</button>';
        html += '<button onclick="deleteDrone(\'' + d.id + '\')" class="btn btn-danger btn-small">🗑</button>';
        html += '</div>';
        html += '</div>';
        // 飛行統計バナー
        html += '<div style="background:#eff6ff;border-radius:0.375rem;padding:0.5rem 0.75rem;margin-bottom:0.75rem;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
        html += '<div style="text-align:center;">';
        html += '<div style="font-size:1.25rem;font-weight:700;color:#1e40af;">' + formatMinutes(totalSecs) + '</div>';
        html += '<div style="font-size:0.7rem;color:#6b7280;">累計総飛行時間</div>';
        html += '</div>';
        html += '<div style="text-align:center;">';
        html += '<div style="font-size:1.25rem;font-weight:700;color:#1e40af;">' + flightCount + '回</div>';
        html += '<div style="font-size:0.7rem;color:#6b7280;">飛行回数</div>';
        html += '</div>';
        html += '<div style="text-align:center;">';
        html += '<div style="font-size:0.85rem;font-weight:600;color:#374151;">' + (lastFlight ? lastFlight.date : '—') + '</div>';
        html += '<div style="font-size:0.7rem;color:#6b7280;">最終飛行</div>';
        html += '</div></div>';
        // 内訳（登録前時間がある場合のみ表示）
        if (preRegSecs > 0) {
            html += '<div style="margin-top:0.375rem;padding-top:0.375rem;border-top:1px solid #bfdbfe;font-size:0.75rem;color:#6b7280;display:flex;gap:1rem;">';
            html += '<span>アプリ記録: <strong style="color:#1e40af;">' + formatMinutes(appSecs) + '</strong></span>';
            html += '<span>登録前: <strong style="color:#6b7280;">' + formatMinutes(preRegSecs) + '</strong></span>';
            html += '</div>';
        }
        html += '</div>';
        html += '<div class="text-sm" style="line-height:1.8;">';
        html += '<p><span class="font-medium">製造番号:</span> ' + d.serialNumber + '</p>';
        if (d.registrationNumber) html += '<p><span class="font-medium">登録記号:</span> ' + d.registrationNumber + '</p>';
        html += '<p><span class="font-medium">重量:</span> ' + d.weight + 'g</p>';
        html += '<p><span class="font-medium">購入日:</span> ' + d.purchaseDate + '</p>';
        if (d.appRegisteredDate) html += '<p><span class="font-medium">アプリ登録日:</span> ' + d.appRegisteredDate + '</p>';
        html += '</div></div>';
    });
    html += '</div>';
    if (!state.drones.length) html += '<div class="empty-state">登録機体がありません</div>';
    return html;
}

// ─── 操縦者管理タブ ───────────────────────────────────────────────────────────
function renderPilotsTab() {
    let html = '<div class="flex-between mb-2"><h2 class="font-bold" style="font-size:1.25rem;">登録操縦者（' + state.pilots.length + '名）</h2>';
    html += '<button onclick="state.showPilotForm=!state.showPilotForm;render();" class="btn btn-primary">+ 操縦者追加</button></div>';
    if (state.showPilotForm) {
        html += '<div class="form-card"><div class="grid grid-2">';
        html += '<div class="form-group"><label class="label">氏名 *</label><input type="text" id="pilot-name" class="input" /></div>';
        html += '<div class="form-group"><label class="label">生年月日 *</label><input type="date" id="pilot-birth" class="input" /></div>';
        html += '<div class="form-group"><label class="label">技能証明種類 *</label><select id="pilot-license-type" class="select">';
        ['','一等無人航空機操縦士','二等無人航空機操縦士','なし'].forEach(t => { html += '<option>' + t + '</option>'; });
        html += '</select></div>';
        html += '<div class="form-group"><label class="label">技能証明番号</label><input type="text" id="pilot-license-number" class="input" placeholder="例: 1A-XXXX-XXXX" /></div>';
        html += '<div class="form-group"><label class="label">発行日</label><input type="date" id="pilot-issue-date" class="input" value="' + TODAY + '" /></div>';
        html += '<div class="form-group"><label class="label">有効期限</label><input type="date" id="pilot-expiry-date" class="input" value="' + TODAY + '" /></div>';
        html += '<div class="form-group"><label class="label">住所</label><input type="text" id="pilot-address" class="input" /></div>';
        html += '<div class="form-group"><label class="label">電話番号</label><input type="tel" id="pilot-phone" class="input" /></div>';
        html += '<div class="form-group"><label class="label">メールアドレス</label><input type="email" id="pilot-email" class="input" /></div>';
        html += '</div>';
        html += '<div style="border:1px solid #d1d5db;border-radius:0.5rem;padding:1rem;margin-bottom:1rem;">';
        html += '<h4 class="font-bold" style="margin-bottom:1rem;">限定事項</h4><div class="grid grid-2">';
        html += '<div><label class="label">機体の種類</label><div style="display:flex;flex-direction:column;gap:0.5rem;">';
        [['マルチローター','マルチローター（回転翼）'],['ヘリコプター','ヘリコプター（回転翼）'],['飛行機','飛行機（固定翼）']].forEach(([v,l]) => {
            html += '<label style="display:flex;align-items:center;gap:0.5rem;"><input type="checkbox" name="aircraft-type" value="' + v + '" class="checkbox" /> ' + l + '</label>';
        });
        html += '</div></div>';
        html += '<div><label class="label">飛行方法の制限</label><div style="display:flex;flex-direction:column;gap:0.5rem;">';
        [['limit-visual','目視内飛行限定'],['limit-daytime','昼間飛行限定'],['limit-25kg','25kg未満限定']].forEach(([id,l]) => {
            html += '<label style="display:flex;align-items:center;gap:0.5rem;"><input type="checkbox" id="' + id + '" class="checkbox" /> ' + l + '</label>';
        });
        html += '</div></div></div></div>';
        html += '<div class="form-group"><label class="label">備考</label><textarea id="pilot-notes" class="textarea" rows="2"></textarea></div>';
        html += '<div class="flex gap-2"><button onclick="submitPilot()" class="btn btn-primary">保存</button>';
        html += '<button onclick="state.showPilotForm=false;render();" class="btn btn-secondary">キャンセル</button></div></div>';
    }
    html += '<div class="grid grid-2">';
    state.pilots.forEach(pilot => {
        html += '<div class="card"><div class="flex-between" style="margin-bottom:0.5rem;">';
        html += '<h3 class="font-bold" style="font-size:1.1rem;">' + pilot.name + '</h3>';
        html += '<div class="flex gap-2">';
        html += '<button onclick="openPilotEditModal(\'' + pilot.id + '\')" class="btn btn-secondary btn-small">✏ 編集</button>';
        html += '<button onclick="deletePilot(\'' + pilot.id + '\')" class="btn btn-danger btn-small">🗑</button>';
        html += '</div>';
        html += '</div>';
        html += '<div class="text-sm" style="line-height:1.8;">';
        html += '<p><span class="font-medium">技能証明:</span> ' + pilot.licenseType + '</p>';
        if (pilot.licenseNumber) html += '<p><span class="font-medium">証明番号:</span> ' + pilot.licenseNumber + '</p>';
        if (pilot.expiryDate) {
            const days = Math.floor((new Date(pilot.expiryDate) - new Date()) / 86400000);
            html += '<p><span class="font-medium">有効期限:</span> ' + pilot.expiryDate;
            if (days < 0) html += ' <span style="color:#dc2626;">(期限切れ)</span>';
            else if (days < 30) html += ' <span style="color:#f59e0b;">(残り' + days + '日)</span>';
            html += '</p>';
        }
        html += '<p><span class="font-medium">生年月日:</span> ' + pilot.birthDate + '</p>';
        if (pilot.phone) html += '<p><span class="font-medium">電話:</span> ' + pilot.phone + '</p>';
        if (pilot.limitations) {
            const limits = [];
            if (pilot.limitations.visualOnly)  limits.push('目視内限定');
            if (pilot.limitations.daytimeOnly) limits.push('昼間限定');
            if (pilot.limitations.under25kg)   limits.push('25kg未満限定');
            if (pilot.limitations.aircraftType?.length || limits.length) {
                html += '<div style="margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid #e5e7eb;">';
                if (pilot.limitations.aircraftType?.length) html += '<p class="text-xs text-gray">機体: ' + pilot.limitations.aircraftType.join(', ') + '</p>';
                if (limits.length) html += '<p class="text-xs text-gray">制限: ' + limits.join(', ') + '</p>';
                html += '</div>';
            }
        }
        html += '</div></div>';
    });
    html += '</div>';
    if (!state.pilots.length) html += '<div class="empty-state">登録操縦者がいません</div>';
    return html;
}

// 初期化
loadData();
</script>
